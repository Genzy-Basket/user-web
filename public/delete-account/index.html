        <h1>Delete Your Account — Genzy Basket</h1>
        <h2>How to delete your Genzy Basket account</h2>
        <p>To delete your account, follow these steps:</p>
        <ol>
          <li>Log in to your Genzy Basket account at <a href="https://genzybasket.com/login">genzybasket.com/login</a> or open the Genzy Basket app.</li>
          <li>Go to your Profile page.</li>
          <li>Scroll down to the Legal section and tap "Delete Account".</li>
          <li>Confirm the deletion by checking the confirmation box and clicking "Delete My Account".</li>
        </ol>
        <h2>What happens when you delete your account?</h2>
        <ul>
          <li>Your personal information (name, email, phone number) will be deactivated.</li>
          <li>Your delivery address and saved preferences will be removed.</li>
          <li>Your order history will be retained for legal and compliance purposes.</li>
          <li>Your wallet balance, if any, will be forfeited.</li>
          <li>Any active subscriptions will be cancelled.</li>
          <li>You will be logged out immediately and cannot log in again.</li>
        </ul>
        <h2>Data Retention</h2>
        <p>In accordance with applicable laws, we may retain certain transaction records and order data for the legally required period. This data will not be used for marketing.</p>
